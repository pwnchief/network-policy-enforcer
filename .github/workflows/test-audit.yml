name: "Test - Audit Mode"

on:
  push:
  workflow_dispatch:

jobs:
  audit-test:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Network Policy Enforcer
        uses: ./
        with:
          mode: audit
          phase: setup

      - name: Fetch allowed domain
        id: fetch-allowed
        run: curl -s https://github.com > /dev/null

      - name: Fetch disallowed domain
        id: fetch-disallowed
        run: curl -s https://evil-exfil.example.com || true

      - name: Install pip package
        id: pip-install
        run: pip install requests || true

      - name: Report
        if: always()
        uses: ./
        with:
          mode: audit
          phase: report
